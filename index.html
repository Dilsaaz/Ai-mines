<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mines - Daily MLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-[90vh] flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-emerald-500 rounded-3xl flex items-center justify-center text-4xl">💎</div>
                <h1 class="logo-font text-5xl text-emerald-400">AI MINES</h1>
                <p class="text-zinc-400">Daily MLM Trading Game</p>
            </div>

            <input id="user-email" type="email" placeholder="Email address daalo" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-lg outline-none mb-6">

            <button onclick="sendOTP()" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl text-xl font-semibold">
                Send OTP on Email
            </button>

            <div id="otp-section" class="hidden mt-8">
                <p class="text-center text-zinc-400 mb-4">6-digit OTP check karo email mein</p>
                <input id="otp-input" type="text" maxlength="6" placeholder="123456" 
                       class="w-full bg-zinc-800 text-4xl text-center tracking-widest rounded-3xl py-8 outline-none">
                <button onclick="verifyOTP()" 
                        class="mt-6 w-full bg-emerald-500 py-5 rounded-3xl text-xl font-semibold">
                    Verify OTP & Continue
                </button>
            </div>
        </div>
    </div>

    <!-- Main App (after login) -->
    <div id="main-app" class="hidden">
        <nav class="bg-zinc-900 p-4 rounded-3xl flex justify-between items-center mb-6">
            <h1 class="logo-font text-3xl text-emerald-400">AI MINES</h1>
            <div class="flex items-center gap-4">
                <span id="nav-balance" class="font-medium">0.00 USDT</span>
                <button onclick="logout()" class="bg-red-500/10 text-red-400 px-5 py-2 rounded-3xl text-sm">Logout</button>
            </div>
        </nav>

        <div class="text-center py-20">
            <h2 class="text-4xl font-bold mb-4">Welcome, <span id="user-name"></span></h2>
            <p id="user-email-show" class="text-emerald-400"></p>
            <button onclick="startTradeDemo()" 
                    class="mt-10 bg-emerald-500 px-12 py-6 rounded-3xl text-2xl font-semibold">
                Start Daily Trade
            </button>
        </div>
    </div>

</div>

<script>
// ================== SUPABASE CONFIG ==================
const supabaseUrl = 'https://ermpjcsduaopamowzlk y.supabase.co';
const supabaseAnonKey = 'sb_publishable_XOqt0yZAJmtbZCnD8vqrdg_YBDfRBf9';   // Tumhara key

const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

let currentUser = null;

// Send OTP
async function sendOTP() {
    const email = document.getElementById('user-email').value.trim();
    if (!email) return alert("Email address daalo");

    const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: { emailRedirectTo: window.location.href }
    });

    if (error) {
        alert("Error: " + error.message);
    } else {
        alert(`✅ OTP bhej diya gaya hai ${email} par.\nInbox aur Spam folder check karo.`);
        document.getElementById('otp-section').classList.remove('hidden');
    }
}

// Verify OTP
async function verifyOTP() {
    const otp = document.getElementById('otp-input').value.trim();
    if (otp.length !== 6) return alert("6 digit OTP daalo");

    const { data, error } = await supabase.auth.verifyOtp({
        email: document.getElementById('user-email').value.trim(),
        token: otp,
        type: 'email'
    });

    if (error) {
        alert("Galat OTP ya expire ho gaya. Dubara try karo.");
    } else {
        currentUser = data.user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        
        document.getElementById('user-name').textContent = currentUser.email.split('@')[0];
        document.getElementById('user-email-show').textContent = currentUser.email;
        
        alert("🎉 Login successful! Welcome to AI Mines");
    }
}

function logout() {
    supabase.auth.signOut();
    location.reload();
}

// Demo Trade Button
function startTradeDemo() {
    alert("Trade section shuru ho gaya hai!\nAbhi full game integrate kar rahe hain.\nAgar chahte ho toh batao main pura mines game + deposit/withdraw sab add kar deta hoon.");
}

// Check if already logged in
async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        currentUser = session.user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-name').textContent = session.user.email.split('@')[0];
        document.getElementById('user-email-show').textContent = session.user.email;
    }
}

window.onload = checkSession;
</script>
</body>
</html>
